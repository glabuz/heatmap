name: Refresh data

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- Polymarket ----------
      - name: Fetch Polymarket markets and events
        run: |
          set -euo pipefail
          BASE="https://gamma-api.polymarket.com"
          Q="active=true&closed=false&archived=false"
          echo "Fetching markets…"
          curl -sSf -H "accept: application/json" "$BASE/markets?$Q&order=volume&ascending=false&limit=300" -o markets.json
          echo "Fetching events (lifetime volume)…"
          curl -sSf -H "accept: application/json" "$BASE/events?$Q&order=volume&ascending=false&limit=1000" -o events_volume.json
          echo "Fetching events (24h volume)…"
          curl -sSf -H "accept: application/json" "$BASE/events?$Q&order=volume24hr&ascending=false&limit=500" -o events_24h.json || echo "[]" > events_24h.json
          python3 -c "import json; m=json.load(open('markets.json')); ev=json.load(open('events_volume.json')); ev2=json.load(open('events_24h.json')); print(f'OK: {len(m)} markets, {len(ev)+len(ev2)} events')"

      - name: Build data.json (Polymarket) with categories
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 - <<'PY'
          import json, os, datetime, urllib.request, urllib.error, time

          GENERIC = {"all", "trending", "featured", "new", "hot", "popular",
                     "recurring", "live", "24h", "weekly", "monthly", "daily"}
          ALLOWED_LABELS = ["Politics", "Sports", "Crypto", "AI / Tech",
                            "Pop Culture", "Markets / Econ", "World / Geopolitics",
                            "Weather / Climate", "Other"]

          def pick_tag(tags):
              if not isinstance(tags, list):
                  return None
              for t in tags:
                  label = t if isinstance(t, str) else (t.get("label") or t.get("slug"))
                  if label and label.lower() not in GENERIC:
                      return label
              return None

          with open("markets.json") as f:
              markets = json.load(f)
          with open("events_volume.json") as f:
              events1 = json.load(f)
          with open("events_24h.json") as f:
              events2 = json.load(f)

          # Tag join
          cat_by_market = {}
          for ev in events1 + events2:
              cat = pick_tag(ev.get("tags"))
              if not cat: continue
              for m in (ev.get("markets") or []):
                  for key in ("id", "conditionId", "slug"):
                      v = m.get(key)
                      if v: cat_by_market[str(v)] = cat

          for m in markets:
              for key in ("id", "conditionId", "slug"):
                  v = m.get(key)
                  if v and str(v) in cat_by_market:
                      m["_category"] = cat_by_market[str(v)]
                      break

          tag_joined = sum(1 for m in markets if m.get("_category"))
          print(f"Tag-joined: {tag_joined}/{len(markets)} markets")

          # AI fallback with cache
          try:
              with open("categories_cache.json") as f:
                  cache = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError):
              cache = {}

          def market_id(m):
              return str(m.get("id") or m.get("conditionId") or m.get("slug") or "")

          def claude_categorize(items):
              api_key = os.environ.get("ANTHROPIC_API_KEY")
              if not api_key or not items:
                  return {}
              labels = ", ".join(ALLOWED_LABELS)
              lines = [
                  f"Classify each prediction-market question into ONE of these categories: {labels}.",
                  "Reply with ONLY a JSON object mapping id to category. No prose, no code fences.",
                  "",
              ]
              for it in items:
                  q = (it["question"] or "").replace("\n", " ").strip()[:240]
                  lines.append(f'{it["id"]}: {q}')
              body = json.dumps({
                  "model": "claude-haiku-4-5",
                  "max_tokens": 4000,
                  "messages": [{"role": "user", "content": "\n".join(lines)}],
              }).encode()
              req = urllib.request.Request(
                  "https://api.anthropic.com/v1/messages",
                  data=body,
                  headers={
                      "x-api-key": api_key,
                      "anthropic-version": "2023-06-01",
                      "content-type": "application/json",
                  },
              )
              try:
                  with urllib.request.urlopen(req, timeout=60) as resp:
                      result = json.loads(resp.read())
                  text = result["content"][0]["text"]
                  s, e = text.find("{"), text.rfind("}") + 1
                  if s >= 0 and e > s:
                      raw = json.loads(text[s:e])
                      return {str(k): v for k, v in raw.items() if v in ALLOWED_LABELS}
              except urllib.error.HTTPError as err:
                  print(f"Claude HTTP {err.code}: {err.read()[:200]}")
              except Exception as e:
                  print(f"Claude failed: {e}")
              return {}

          to_classify = []
          for m in markets:
              if m.get("_category"): continue
              mid = market_id(m)
              if not mid: continue
              if mid in cache:
                  m["_category"] = cache[mid]
                  continue
              to_classify.append({"id": mid, "question": m.get("question") or m.get("slug") or ""})

          if to_classify and os.environ.get("ANTHROPIC_API_KEY"):
              print(f"Calling Claude for {len(to_classify)} new markets…")
              for i in range(0, len(to_classify), 60):
                  chunk = to_classify[i:i + 60]
                  result = claude_categorize(chunk)
                  for mid, cat in result.items():
                      cache[mid] = cat
                  if i + 60 < len(to_classify):
                      time.sleep(1)
              for m in markets:
                  if not m.get("_category"):
                      mid = market_id(m)
                      if mid in cache:
                          m["_category"] = cache[mid]
              with open("categories_cache.json", "w") as f:
                  json.dump(cache, f, indent=2, sort_keys=True)
              print(f"Cache size: {len(cache)} markets")
          elif to_classify:
              print(f"Skipping AI (no ANTHROPIC_API_KEY); {len(to_classify)} stay uncategorized")

          final = sum(1 for m in markets if m.get("_category"))
          print(f"Final: {final}/{len(markets)} markets categorized")

          payload = {
              "fetchedAt": datetime.datetime.utcnow().isoformat() + "Z",
              "count": len(markets),
              "markets": markets,
              "source": "polymarket",
          }
          with open("data.json", "w") as f:
              json.dump(payload, f, separators=(",", ":"))
          PY

      # ---------- Limitless (best-effort) ----------
      - name: Fetch Limitless markets
        run: |
          set +e
          # Try a few likely public endpoints. If all fail, write an empty list
          # so the page can show a clean "no data" state without breaking.
          for URL in \
            "https://api.limitless.exchange/markets/active" \
            "https://api.limitless.exchange/markets" \
            "https://api.limitless.exchange/v1/markets"; do
            echo "Trying $URL"
            if curl -sSf -H "accept: application/json" --max-time 20 "$URL" -o limitless_raw.json; then
              echo "Got data from $URL"
              break
            fi
          done
          if [ ! -s limitless_raw.json ]; then echo '[]' > limitless_raw.json; fi
          set -e

      - name: Build data-limitless.json
        run: |
          python3 - <<'PY'
          import json, datetime

          try:
              raw = json.load(open("limitless_raw.json"))
          except Exception:
              raw = []
          if isinstance(raw, dict):
              for k in ("markets", "data", "items", "results"):
                  if isinstance(raw.get(k), list):
                      raw = raw[k]; break
              else:
                  raw = []
          if not isinstance(raw, list):
              raw = []

          def num(x, default=0):
              try:
                  return float(x) if x is not None else default
              except (TypeError, ValueError):
                  return default

          markets = []
          for m in raw:
              if not isinstance(m, dict): continue
              question = m.get("title") or m.get("question") or m.get("name") or m.get("slug") or ""
              slug     = m.get("slug") or str(m.get("id") or m.get("address") or "")
              volume     = num(m.get("volume") or m.get("totalVolume") or m.get("volumeFormatted") or m.get("volumeUSD"))
              liquidity  = num(m.get("liquidity") or m.get("totalLiquidity") or m.get("liquidityFormatted"))
              volume24hr = num(m.get("volume24hr") or m.get("volume24h") or m.get("dailyVolume"))
              yp = m.get("yesPrice") or m.get("probability") or m.get("price")
              try:
                  yp = float(yp) if yp is not None else None
              except (TypeError, ValueError):
                  yp = None
              if yp is not None and yp > 1.5:
                  yp /= 100.0
              if yp is None:
                  yp = 0.5
              markets.append({
                  "id": str(m.get("id") or m.get("address") or slug),
                  "conditionId": m.get("conditionId") or m.get("address"),
                  "slug": slug,
                  "question": question,
                  "volumeNum": volume,
                  "liquidityNum": liquidity,
                  "volume24hr": volume24hr,
                  "outcomes": '["Yes","No"]',
                  "outcomePrices": json.dumps([str(yp), str(round(1 - yp, 6))]),
                  "_category": m.get("category") or "Other",
                  "_link": m.get("url") or m.get("permalink") or (f"https://limitless.exchange/markets/{slug}" if slug else None),
              })

          payload = {
              "fetchedAt": datetime.datetime.utcnow().isoformat() + "Z",
              "count": len(markets),
              "markets": markets,
              "source": "limitless",
          }
          with open("data-limitless.json", "w") as f:
              json.dump(payload, f, separators=(",", ":"))
          print(f"Wrote {len(markets)} Limitless markets")
          PY

      - name: Cleanup intermediate files
        run: rm -f markets.json events_volume.json events_24h.json limitless_raw.json

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json data-limitless.json categories_cache.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: refresh [skip ci]"
            git push
          fi
