name: Refresh data

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- Polymarket ----------
      - name: Fetch Polymarket markets and events
        run: |
          set -euo pipefail
          BASE="https://gamma-api.polymarket.com"
          Q="active=true&closed=false&archived=false"
          echo "Fetching markets…"
          curl -sSf -H "accept: application/json" "$BASE/markets?$Q&order=volume&ascending=false&limit=300" -o markets.json
          echo "Fetching events (lifetime volume)…"
          curl -sSf -H "accept: application/json" "$BASE/events?$Q&order=volume&ascending=false&limit=1000" -o events_volume.json
          echo "Fetching events (24h volume)…"
          curl -sSf -H "accept: application/json" "$BASE/events?$Q&order=volume24hr&ascending=false&limit=500" -o events_24h.json || echo "[]" > events_24h.json
          python3 -c "import json; m=json.load(open('markets.json')); ev=json.load(open('events_volume.json')); ev2=json.load(open('events_24h.json')); print(f'OK: {len(m)} markets, {len(ev)+len(ev2)} events')"

      - name: Build data.json (Polymarket) with categories
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 - <<'PY'
          import json, os, datetime, urllib.request, urllib.error, time

          GENERIC = {"all", "trending", "featured", "new", "hot", "popular",
                     "recurring", "live", "24h", "weekly", "monthly", "daily"}
          ALLOWED_LABELS = ["Politics", "Sports", "Crypto", "AI / Tech",
                            "Pop Culture", "Markets / Econ", "World / Geopolitics",
                            "Weather / Climate", "Other"]

          # Map specific Polymarket tags to one of our broad categories so the
          # heatmap doesn't end up with one-off categories like "Mojtaba".
          TAG_MAPPING = {
              # Politics (US-domestic)
              "politics": "Politics", "us politics": "Politics",
              "elections": "Politics", "election": "Politics", "2024 election": "Politics",
              "trump": "Politics", "biden": "Politics", "harris": "Politics",
              "kamala": "Politics", "vance": "Politics", "obama": "Politics",
              "supreme court": "Politics", "scotus": "Politics",
              "senate": "Politics", "house": "Politics", "congress": "Politics",
              "president": "Politics", "presidential": "Politics",
              "democrat": "Politics", "republican": "Politics", "gop": "Politics",
              # Sports
              "sports": "Sports", "nfl": "Sports", "nba": "Sports", "mlb": "Sports",
              "nhl": "Sports", "ufc": "Sports", "mma": "Sports", "boxing": "Sports",
              "soccer": "Sports", "football": "Sports", "tennis": "Sports",
              "golf": "Sports", "f1": "Sports", "formula 1": "Sports",
              "nascar": "Sports", "olympics": "Sports", "world cup": "Sports",
              "champions league": "Sports", "premier league": "Sports",
              "march madness": "Sports", "ncaa": "Sports", "esports": "Sports",
              "valorant": "Sports", "league of legends": "Sports", "csgo": "Sports",
              # Crypto
              "crypto": "Crypto", "cryptocurrency": "Crypto",
              "bitcoin": "Crypto", "btc": "Crypto",
              "ethereum": "Crypto", "eth": "Crypto",
              "solana": "Crypto", "sol": "Crypto",
              "memecoins": "Crypto", "memecoin": "Crypto",
              "defi": "Crypto", "nft": "Crypto", "stablecoin": "Crypto",
              # AI / Tech
              "ai": "AI / Tech", "artificial intelligence": "AI / Tech",
              "tech": "AI / Tech", "technology": "AI / Tech",
              "openai": "AI / Tech", "chatgpt": "AI / Tech", "anthropic": "AI / Tech",
              "google": "AI / Tech", "apple": "AI / Tech", "microsoft": "AI / Tech",
              "tesla": "AI / Tech", "spacex": "AI / Tech",
              "elon musk": "AI / Tech", "musk": "AI / Tech",
              # World / Geopolitics
              "geopolitics": "World / Geopolitics", "world": "World / Geopolitics",
              "international": "World / Geopolitics",
              "iran": "World / Geopolitics", "israel": "World / Geopolitics",
              "ukraine": "World / Geopolitics", "russia": "World / Geopolitics",
              "china": "World / Geopolitics", "north korea": "World / Geopolitics",
              "putin": "World / Geopolitics", "zelensky": "World / Geopolitics",
              "netanyahu": "World / Geopolitics",
              "xi jinping": "World / Geopolitics", "xi": "World / Geopolitics",
              "war": "World / Geopolitics", "middle east": "World / Geopolitics",
              "gaza": "World / Geopolitics", "hamas": "World / Geopolitics",
              "hezbollah": "World / Geopolitics", "houthi": "World / Geopolitics",
              "syria": "World / Geopolitics", "lebanon": "World / Geopolitics",
              "venezuela": "World / Geopolitics", "maduro": "World / Geopolitics",
              "mojtaba": "World / Geopolitics", "khamenei": "World / Geopolitics",
              "ayatollah": "World / Geopolitics",
              "nato": "World / Geopolitics", "brexit": "World / Geopolitics",
              "european union": "World / Geopolitics", "eu": "World / Geopolitics",
              "tariffs": "World / Geopolitics", "tariff": "World / Geopolitics",
              # Pop Culture
              "pop culture": "Pop Culture", "celebrities": "Pop Culture",
              "music": "Pop Culture", "movies": "Pop Culture", "film": "Pop Culture",
              "tv": "Pop Culture", "entertainment": "Pop Culture",
              # Markets / Econ
              "markets": "Markets / Econ", "stocks": "Markets / Econ",
              "economy": "Markets / Econ", "economics": "Markets / Econ",
              "fed": "Markets / Econ", "fed rates": "Markets / Econ",
              "inflation": "Markets / Econ", "gdp": "Markets / Econ",
              "recession": "Markets / Econ",
              # Weather / Climate
              "weather": "Weather / Climate", "climate": "Weather / Climate",
              "hurricane": "Weather / Climate", "heat wave": "Weather / Climate",
              "wildfire": "Weather / Climate",
          }

          def pick_tag(tags):
              # Only accept tags that map to one of our broad categories; otherwise
              # let the AI / text-inference fallbacks decide.
              if not isinstance(tags, list):
                  return None
              for t in tags:
                  label = t if isinstance(t, str) else (t.get("label") or t.get("slug"))
                  if not label or label.lower() in GENERIC:
                      continue
                  mapped = TAG_MAPPING.get(label.strip().lower())
                  if mapped:
                      return mapped
              return None

          with open("markets.json") as f:
              markets = json.load(f)
          with open("events_volume.json") as f:
              events1 = json.load(f)
          with open("events_24h.json") as f:
              events2 = json.load(f)

          # Tag join
          cat_by_market = {}
          for ev in events1 + events2:
              cat = pick_tag(ev.get("tags"))
              if not cat: continue
              for m in (ev.get("markets") or []):
                  for key in ("id", "conditionId", "slug"):
                      v = m.get(key)
                      if v: cat_by_market[str(v)] = cat

          for m in markets:
              for key in ("id", "conditionId", "slug"):
                  v = m.get(key)
                  if v and str(v) in cat_by_market:
                      m["_category"] = cat_by_market[str(v)]
                      break

          tag_joined = sum(1 for m in markets if m.get("_category"))
          print(f"Tag-joined: {tag_joined}/{len(markets)} markets")

          # AI fallback with cache
          try:
              with open("categories_cache.json") as f:
                  cache = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError):
              cache = {}

          def market_id(m):
              return str(m.get("id") or m.get("conditionId") or m.get("slug") or "")

          def claude_categorize(items):
              api_key = os.environ.get("ANTHROPIC_API_KEY")
              if not api_key or not items:
                  return {}
              labels = ", ".join(ALLOWED_LABELS)
              lines = [
                  f"Classify each prediction-market question into ONE of these categories: {labels}.",
                  "Reply with ONLY a JSON object mapping id to category. No prose, no code fences.",
                  "",
              ]
              for it in items:
                  q = (it["question"] or "").replace("\n", " ").strip()[:240]
                  lines.append(f'{it["id"]}: {q}')
              body = json.dumps({
                  "model": "claude-haiku-4-5",
                  "max_tokens": 4000,
                  "messages": [{"role": "user", "content": "\n".join(lines)}],
              }).encode()
              req = urllib.request.Request(
                  "https://api.anthropic.com/v1/messages",
                  data=body,
                  headers={
                      "x-api-key": api_key,
                      "anthropic-version": "2023-06-01",
                      "content-type": "application/json",
                  },
              )
              try:
                  with urllib.request.urlopen(req, timeout=60) as resp:
                      result = json.loads(resp.read())
                  text = result["content"][0]["text"]
                  s, e = text.find("{"), text.rfind("}") + 1
                  if s >= 0 and e > s:
                      raw = json.loads(text[s:e])
                      return {str(k): v for k, v in raw.items() if v in ALLOWED_LABELS}
              except urllib.error.HTTPError as err:
                  print(f"Claude HTTP {err.code}: {err.read()[:200]}")
              except Exception as e:
                  print(f"Claude failed: {e}")
              return {}

          to_classify = []
          for m in markets:
              if m.get("_category"): continue
              mid = market_id(m)
              if not mid: continue
              if mid in cache:
                  m["_category"] = cache[mid]
                  continue
              to_classify.append({"id": mid, "question": m.get("question") or m.get("slug") or ""})

          if to_classify and os.environ.get("ANTHROPIC_API_KEY"):
              print(f"Calling Claude for {len(to_classify)} new markets…")
              for i in range(0, len(to_classify), 60):
                  chunk = to_classify[i:i + 60]
                  result = claude_categorize(chunk)
                  for mid, cat in result.items():
                      cache[mid] = cat
                  if i + 60 < len(to_classify):
                      time.sleep(1)
              for m in markets:
                  if not m.get("_category"):
                      mid = market_id(m)
                      if mid in cache:
                          m["_category"] = cache[mid]
              with open("categories_cache.json", "w") as f:
                  json.dump(cache, f, indent=2, sort_keys=True)
              print(f"Cache size: {len(cache)} markets")
          elif to_classify:
              print(f"Skipping AI (no ANTHROPIC_API_KEY); {len(to_classify)} stay uncategorized")

          final = sum(1 for m in markets if m.get("_category"))
          print(f"Final: {final}/{len(markets)} markets categorized")

          payload = {
              "fetchedAt": datetime.datetime.utcnow().isoformat() + "Z",
              "count": len(markets),
              "markets": markets,
              "source": "polymarket",
          }
          with open("data.json", "w") as f:
              json.dump(payload, f, separators=(",", ":"))
          PY

      # ---------- Limitless ----------
      - name: Fetch Limitless markets
        run: |
          set +e
          # Limitless paginates — try the largest sensible page first, then
          # smaller fallbacks if the limit is rejected. Empty file ⇒ workflow
          # still writes a clean data-limitless.json with zero markets.
          for URL in \
            "https://api.limitless.exchange/markets/active?limit=200&sortBy=volume" \
            "https://api.limitless.exchange/markets/active?limit=100" \
            "https://api.limitless.exchange/markets/active"; do
            echo "Trying $URL"
            if curl -sSf -H "accept: application/json" --max-time 20 "$URL" -o limitless_raw.json; then
              echo "Got data from $URL"
              break
            fi
          done
          if [ ! -s limitless_raw.json ]; then echo '{"data":[]}' > limitless_raw.json; fi
          set -e

      - name: Build data-limitless.json
        run: |
          python3 - <<'PY'
          import json, datetime

          try:
              payload = json.load(open("limitless_raw.json"))
          except Exception:
              payload = {"data": []}
          # Limitless wraps everything in {"data":[...], "totalMarketsCount":N}.
          # Tolerate the bare-array case too.
          raw = payload.get("data") if isinstance(payload, dict) else payload
          if not isinstance(raw, list):
              raw = []

          def num(x, default=0.0):
              if x is None:
                  return default
              try:
                  return float(x)
              except (TypeError, ValueError):
                  return default

          # Limitless tags include internal labels ("Lumy" = their AMM bot,
          # "Simple Mode" = a UI flag, etc.) that aren't useful topic categories.
          GENERIC_CATS = {"hourly", "daily", "weekly", "monthly", "recurring",
                          "all", "trending", "featured", "new",
                          "lumy", "simple mode", "manual", "amm", "clob",
                          "negrisk", "single", "live", "24h", "automated",
                          "sports automation", "auto"}
          # Map specific Limitless tags to broad heatmap categories.
          LIMITLESS_TAG_MAP = {
              "crypto": "Crypto", "bitcoin": "Crypto", "btc": "Crypto",
              "ethereum": "Crypto", "eth": "Crypto", "solana": "Crypto",
              "doge": "Crypto", "memecoin": "Crypto", "memecoins": "Crypto",
              "stocks": "Markets / Econ", "stock": "Markets / Econ",
              "spx": "Markets / Econ", "s&p": "Markets / Econ", "nasdaq": "Markets / Econ",
              "tesla": "Markets / Econ", "nvidia": "Markets / Econ", "apple": "Markets / Econ",
              "sports": "Sports", "nfl": "Sports", "nba": "Sports", "mlb": "Sports",
              "ufc": "Sports", "soccer": "Sports", "tennis": "Sports",
              "politics": "Politics", "elections": "Politics",
              "ai": "AI / Tech", "tech": "AI / Tech",
              "weather": "Weather / Climate", "climate": "Weather / Climate",
          }

          def pick_category(m):
              # Look in both `categories` and `tags`; return the first one that
              # maps to a broad heatmap category. Anything else is left None so
              # the page-side text inference can categorize from the title.
              for source in (m.get("categories") or [], m.get("tags") or []):
                  for t in source:
                      if not isinstance(t, str): continue
                      norm = t.strip().lower()
                      if not norm or norm in GENERIC_CATS: continue
                      if norm in LIMITLESS_TAG_MAP:
                          return LIMITLESS_TAG_MAP[norm]
              return None

          markets = []
          for m in raw:
              if not isinstance(m, dict): continue
              title = m.get("title") or m.get("name") or m.get("slug") or ""
              slug  = m.get("slug") or str(m.get("id") or m.get("address") or "")

              # *Formatted fields are already in human-readable USDC.
              volume    = num(m.get("volumeFormatted"))
              liquidity = num(m.get("liquidityFormatted"))
              if volume == 0.0 and m.get("volume"):
                  decimals = (m.get("collateralToken") or {}).get("decimals") or 6
                  volume = num(m.get("volume")) / (10 ** decimals)
              if liquidity == 0.0 and m.get("liquidity"):
                  decimals = (m.get("collateralToken") or {}).get("decimals") or 6
                  liquidity = num(m.get("liquidity")) / (10 ** decimals)

              # prices = [yesPercent, noPercent] in 0–100 range.
              prices = m.get("prices") or []
              yp = None
              if isinstance(prices, list) and prices:
                  yp = num(prices[0], default=None)
                  if yp is not None and yp > 1.5:
                      yp /= 100.0
              if yp is None:
                  yp = 0.5

              markets.append({
                  "id": str(m.get("id") or m.get("address") or slug),
                  "conditionId": m.get("conditionId") or m.get("address"),
                  "slug": slug,
                  "question": title,
                  "volumeNum": volume,
                  "liquidityNum": liquidity,
                  # Limitless doesn't expose a 24h volume field; total volume is
                  # the closest stand-in (and most Limitless markets are short
                  # duration anyway, so the gap is small in practice).
                  "volume24hr": volume,
                  "outcomes": '["Yes","No"]',
                  "outcomePrices": json.dumps([str(yp), str(round(1 - yp, 6))]),
                  "_category": pick_category(m),
                  "_link": f"https://limitless.exchange/markets/{slug}" if slug else None,
              })

          out = {
              "fetchedAt": datetime.datetime.utcnow().isoformat() + "Z",
              "count": len(markets),
              "markets": markets,
              "source": "limitless",
          }
          with open("data-limitless.json", "w") as f:
              json.dump(out, f, separators=(",", ":"))
          print(f"Wrote {len(markets)} Limitless markets")
          PY

      - name: Cleanup intermediate files
        run: rm -f markets.json events_volume.json events_24h.json limitless_raw.json

      - name: Show generated data files
        run: |
          echo "--- ls -la for data files ---"
          ls -la data*.json categories_cache.json 2>&1 || true
          echo "--- data.json head ---"
          head -c 200 data.json 2>&1 || echo "data.json missing"
          echo
          echo "--- data-limitless.json head ---"
          head -c 200 data-limitless.json 2>&1 || echo "data-limitless.json missing"
          echo

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage each file independently so a missing one doesn't abort the rest.
          for f in data.json data-limitless.json categories_cache.json; do
            if [ -f "$f" ]; then
              git add "$f" && echo "staged $f"
            else
              echo "skip $f (not present)"
            fi
          done
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: refresh [skip ci]"
            git push
          fi
