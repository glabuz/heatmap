name: Refresh data

on:
  push:
    branches: [main]
  schedule:
    # Every 10 minutes (GitHub may run slightly less frequently under load).
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch markets from Polymarket Gamma API
        run: |
          set -euo pipefail
          URL="https://gamma-api.polymarket.com/markets?active=true&closed=false&archived=false&order=volume&ascending=false&limit=300"
          echo "Fetching: $URL"
          curl -sSf -H "accept: application/json" "$URL" -o data.json
          # Validate it's a non-empty JSON array.
          python3 -c "import json,sys; d=json.load(open('data.json')); assert isinstance(d, list) and len(d) > 0, 'Bad payload'; print(f'OK: {len(d)} markets')"

      - name: Add fetched-at metadata
        run: |
          # Wrap the array with a tiny header so the page can show a
          # "data fetched at" timestamp without an extra request.
          python3 - <<'PY'
          import json, datetime
          with open("data.json") as f:
              markets = json.load(f)
          payload = {
              "fetchedAt": datetime.datetime.utcnow().isoformat() + "Z",
              "count": len(markets),
              "markets": markets,
          }
          with open("data.json", "w") as f:
              json.dump(payload, f, separators=(",", ":"))
          PY

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: refresh [skip ci]"
            git push
          fi
